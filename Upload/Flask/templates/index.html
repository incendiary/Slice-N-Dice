<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slice-N-Dice Receiver</title>
    <style>
        body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
        .info { background: #f9f9f9; border-left: 4px solid #555; padding: 12px 16px; margin: 20px 0; }
    </style>
</head>
<body>
<h1>Slice-N-Dice Receiver</h1>
<div class="info">
    <p><strong>Session ID:</strong> <code>{{ file_guid }}</code></p>
    <p><strong>Expected parts:</strong> <code>{{ number_of_files }}</code></p>
    <p><strong>Upload endpoint:</strong> <code>http://{{ server_hostname }}{{ upload_url }}</code></p>
</div>
<p><a href="{{ upload_url }}">Go to upload page</a></p>
</body>
</html>
