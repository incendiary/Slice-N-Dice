name: Lint

on: [push, pull_request]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install linters
        run: pip install black==26.3.1 isort==8.0.1 flake8==7.3.0
      - name: black
        run: black --check .
      - name: isort
        run: isort --check-only .
      - name: flake8
        run: flake8 .

  dotnet-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
      - name: Restore packages
        run: dotnet restore Side_Load/Encryptors/cs/Dice.cs/Dice.cs.sln
      - name: dotnet format
        run: dotnet format --verify-no-changes Side_Load/Encryptors/cs/Dice.cs/Dice.cs.sln
